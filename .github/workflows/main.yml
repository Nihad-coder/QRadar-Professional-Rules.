name: QRadar Rule Validator

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu GitHub-dan çək
      uses: actions/checkout@v2

    - name: Python mühitini qur
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Kitabxanaları yüklə
      run: pip install requests

    - name: Skripti işə sal (Deploy to QRadar)
      env:
        QRADAR_IPV4: ${{ secrets.QRADAR_IPV4 }}
        QRADAR_TOKEN6: ${{ secrets.QRADAR_TOKEN6 }}
      run: python qradar_api_integration.py
